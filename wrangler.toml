name = "duosync"
main = "worker/index.ts"
compatibility_date = "2025-01-01"

# Static SPA built into ./dist by `pnpm build`. The Worker runs first only for
# /api/*; every other path is served from assets with SPA (index.html) fallback.
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

# D1 bound to the Worker as `env.DB`.
[[d1_databases]]
binding = "DB"
database_name = "duosync"
database_id = "d041d28b-5c00-4677-bf29-951a059a9f57"
migrations_dir = "db/migrations"
